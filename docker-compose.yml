version: '3.8'

services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "5001:$5001"   # Expose backend port from .env
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - NODE_ENV=${NODE_ENV}
    restart: unless-stopped
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    ports:
      - "5173:5173" 
    environment:
      - VITE_API_BASE_URL=http://16.16.70.146/api
    depends_on:
      - backend

  mongo:
    image: mongo:6
    container_name: chatapp_mongo
    ports:
      - "27017:27017"
